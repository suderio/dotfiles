[settings]
experimental = true
dotfiles.root = "~/.local/.dotfiles"
dotfiles.default_mode = "symlink"

[settings.cargo]
binstall = true

[settings.erlang]
compile = false

[settings.node]
compile = false
gpg_verify = true

[settings.python]
compile = false

[bootstrap.repos]
"~/.local/.dotfiles" = { url = "https://github.com/suderio/dotfiles", ref = "main" }

[dotfiles]
"~/.bashrc.d" = { mode = "symlink-each" }
"~/.config" = { mode = "symlink-each" }
"~/.local" = { mode = "symlink-each" }
"~/.m2" = { mode = "symlink-each" }
"~/.ssh" = { mode = "symlink-each" }
"~/.bash_logout" = {}
"~/.bash_profile" = {}
"~/.bashrc" = {}
"~/.editorconfig" = {}
"~/.gitconfig" = {}
"~/.gitignore" = {}
"~/.hushlogin" = {}
"~/.inputrc" = {}
"~/.profile" = {}
"~/.Xresources" = {}
"/etc/wsl.conf" = { block = '''
[boot]
systemd=true

[network]
generateHosts=false
generateResolvConf=false

[interop]
enabled = false
appendWindowsPath = false
''' }

[plugins]
emacs = "https://github.com/suderio/misemacs"

[tools]
emacs = "latest"
neovim = "latest"

[tasks.neovim]
run = '''
    echo "Installing pynvim package"
    uv venv --clear "$XDG_DATA_HOME/nvim/venv"
    uv pip install pynvim -p "$XDG_DATA_HOME/nvim/venv"

    echo "Installing npm neovim package"
    npm install --global neovim

    echo "Installing ruby neovim gem"
    gem install neovim

    echo "Installing cpan neovim package"
    cpanm -n Neovim::Ext
'''
