[engine]
# Passes proxy environment variables to the Podman engine itself (e.g., for pulling images)
env = ["http_proxy=localhost:3128", "https_proxy=localhost:3128", "no_proxy=localhost,127.0.0.1,.bndes.net"]

[containers]
# Passes proxy environment variables into the running containers
http_proxy = true # Explicitly enables proxy injection
env = ["http_proxy=localhost:3128", "https_proxy=localhost:3128", "no_proxy=localhost,127.0.0.1,.bndes.net"]

